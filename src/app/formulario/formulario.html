<section class="mx-auto w-full max-w-2xl px-4 py-6">
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h3 class="card-title">Ficha de Matrícula</h3>

            <form class="grid gap-3" action="">
                <div class="form-control w-full">
                    <label class="label" for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required minlength="3" class="input input-bordered w-full" />
                </div>

                <div class="form-control w-full">
                    <label class="label" for="email">Email: </label>
                    <input type="email" id="email" name="email" required class="input input-bordered w-full" />
                </div>

                <div class="form-control w-full">
                    <label class="label" for="idade">Idade: </label>
                    <input type="number" id="idade" name="idade" required min="18" class="input input-bordered w-full" />
                </div>

                <div class="form-control w-full">
                    <label class="label" for="senha">Senha: </label>
                    <input type="password" id="senha" name="senha" required minlength="6" class="input input-bordered w-full" />
                </div>

                <div class="form-control w-full">
                    <label class="label" for="confirmarSenha">Confirmar Senha: </label>
                    <input
                        type="password"
                        id="confirmarSenha"
                        name="confirmarSenha"
                        required
                        minlength="6"
                        class="input input-bordered w-full"
                    />
                </div>

                <div class="form-control w-full">
                    <label class="label" for="genero">Gênero: </label>
                    <select id="genero" name="genero" required class="select select-bordered w-full">
                        <option value="">Selecione</option>
                        <option value="masculino">Masculino</option>
                        <option value="feminino">Feminino</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>

                <div class="form-control w-full">
                    <label class="label" for="cidade">Cidade: </label>
                    <select name="cidade" id="cidade" required class="select select-bordered w-full">
                        <option value="">Selecione</option>
                        <option value="Colatina">Colatina</option>
                        <option value="São Mateus">São Mateus</option>
                        <option value="Linhares">Linhares</option>
                    </select>
                </div>
                

                <label class="label cursor-pointer justify-start gap-3">
                    <input type="checkbox" id="termos" name="termos" required class="checkbox checkbox-primary" />
                    <span class="label-text">Aceito os termos e condições</span>
                </label>

                <button type="submit" class="btn btn-primary mt-2 w-full">Enviar</button>
            </form>
        </div>
    </div>
</section>
